<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Luma - Confirm Email</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin="">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    body {
      font-family: 'Inter', sans-serif;
      background-color: #000;
      color: #fff;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }
  </style>
</head>

<body class="min-h-screen bg-black text-zinc-200 flex items-center justify-center px-4">
  <main class="w-full max-w-md rounded-2xl border border-white/10 bg-zinc-900/50 p-8 text-center">
    <h1 class="text-2xl font-medium text-white mb-3">Confirming your email</h1>
    <p id="status-text" class="text-sm text-zinc-400 mb-4">
      Please wait while we confirm your early access signup.
    </p>
    <div id="status-spinner"
      class="mx-auto h-6 w-6 rounded-full border-2 border-zinc-400 border-t-transparent animate-spin"
      aria-hidden="true"></div>
    <a href="/"
      class="hidden mt-6 inline-flex text-sm text-white bg-white/10 border border-white/10 px-4 py-2 rounded-full hover:bg-white/20 transition-colors"
      id="home-link">Back to Luma</a>
  </main>

  <script>
    const statusText = document.getElementById('status-text');
    const spinner = document.getElementById('status-spinner');
    const homeLink = document.getElementById('home-link');

    function setState(message, isSuccess) {
      statusText.textContent = message;
      spinner.classList.add('hidden');
      homeLink.classList.remove('hidden');
      statusText.classList.toggle('text-emerald-300', Boolean(isSuccess));
      statusText.classList.toggle('text-red-300', isSuccess === false);
    }

    async function confirmSignup() {
      const token = new URLSearchParams(window.location.search).get('token');
      if (!token) {
        setState('Missing confirmation token. Please use the link from your email.', false);
        return;
      }

      try {
        const response = await fetch(`/api/waitlist-confirm?token=${encodeURIComponent(token)}`);
        const data = await response.json().catch(() => ({}));

        if (response.ok && data.success) {
          setState('Your email is confirmed. You are on the waitlist.', true);
          return;
        }

        setState(data.message || 'Invalid or expired confirmation link.', false);
      } catch (_) {
        setState('Network error while confirming. Please try again.', false);
      }
    }

    confirmSignup();
  </script>
</body>

</html>
